services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - vaultflow-data:/app
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:vaultflow.db
      - VAULTFLOW_JWT_SECRET=VaultFlow-Core-SecretKey-2026-MustBeAtLeast256BitsLong!!
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vaultflow-data:
