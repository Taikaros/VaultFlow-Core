spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  security:
    enabled: false

vaultflow:
  jwt:
    secret: test-secret-key-for-integration-tests-must-be-256bits
    expiration: 3600000
