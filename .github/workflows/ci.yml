name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Backend Tests
        run: mvn test -B
        working-directory: ./backend

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Frontend Build
        run: |
          npm ci
          npm run build
        working-directory: ./frontend

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -B
        working-directory: ./backend

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: ./frontend

      - name: Package frontend
        run: |
          cd frontend
          tar -czf ../vaultflow-frontend.tar.gz .next/ package.json node_modules/ next.config.mjs 2>/dev/null || \
          tar -czf ../vaultflow-frontend.tar.gz .next/ package.json node_modules/

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: VaultFlow-Core ${{ github.ref_name }}
          body_path: .github/release-template.md
          files: |
            backend/target/vaultflow-core-${{ steps.version.outputs.tag }}.jar
            vaultflow-frontend.tar.gz
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}

      - name: Advance deploy branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin deploy 2>/dev/null || true
          git branch -f deploy ${{ github.sha }}
          git push origin deploy --force

  docker:
    name: Publish Docker Images
    if: startsWith(github.ref, 'refs/tags/v') && secrets.DOCKER_USERNAME != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set Docker tags
        id: docker_tags
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          BACKEND="${{ secrets.DOCKER_USERNAME }}/vaultflow-backend"
          FRONTEND="${{ secrets.DOCKER_USERNAME }}/vaultflow-frontend"

          if [[ "${{ github.ref_name }}" != *-* ]]; then
            # Stable release — tag :latest and :version
            echo "backend_tags=${BACKEND}:latest,${BACKEND}:${VERSION}" >> $GITHUB_OUTPUT
            echo "frontend_tags=${FRONTEND}:latest,${FRONTEND}:${VERSION}" >> $GITHUB_OUTPUT
          else
            # Pre-release — tag only :version
            echo "backend_tags=${BACKEND}:${VERSION}" >> $GITHUB_OUTPUT
            echo "frontend_tags=${FRONTEND}:${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.docker_tags.outputs.backend_tags }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.docker_tags.outputs.frontend_tags }}
