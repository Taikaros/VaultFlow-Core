openapi: 3.1.0
info:
  title: VaultFlow-Core API
  description: |
    API corporativa para la gestión de tarjetas digitales, wallets y pagos
    entre empleados y equipos dentro de una empresa.
  version: 1.1.0
  contact:
    name: VaultFlow Team

servers:
  - url: http://localhost:8080/api/v1
    description: Desarrollo local

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: Solicitud inválida
        details:
          type: string

    Pageable:
      type: object
      properties:
        page:
          type: integer
          default: 0
          minimum: 0
        size:
          type: integer
          default: 20
          minimum: 1
          maximum: 100

    PageResponse:
      type: object
      properties:
        content:
          type: array
        totalElements:
          type: integer
        totalPages:
          type: integer
        number:
          type: integer
      description: Respuesta paginada estándar

    Company:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        taxId:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CompanyCreateRequest:
      type: object
      required: [name, taxId, email, password]
      properties:
        name:
          type: string
        taxId:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        company:
          $ref: '#/components/schemas/Company'

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, EMPLOYEE]
        walletId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    UserCreateRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum: [ADMIN, EMPLOYEE]
          default: EMPLOYEE
        walletId:
          type: string
          format: uuid

    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, EMPLOYEE]
        walletId:
          type: string
          format: uuid

    Wallet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        balance:
          type: number
          format: double
          minimum: 0
        currency:
          type: string
          default: USD
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Card:
      type: object
      properties:
        id:
          type: string
          format: uuid
        walletId:
          type: string
          format: uuid
        cardNumber:
          type: string
          description: Últimos 4 dígitos
        holderName:
          type: string
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, CANCELLED]
        limitAmount:
          type: number
          format: double
        spentAmount:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time

    CardCreateRequest:
      type: object
      required: [holderName]
      properties:
        holderName:
          type: string
        limitAmount:
          type: number
          format: double

    CardUpdateRequest:
      type: object
      properties:
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, CANCELLED]
        limitAmount:
          type: number
          format: double

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fromCardId:
          type: string
          format: uuid
        toWalletId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        description:
          type: string
        type:
          type: string
          enum: [PAYMENT, TOPUP, REFUND]
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        createdAt:
          type: string
          format: date-time

    TransactionRequest:
      type: object
      required: [fromCardId, toWalletId, amount]
      properties:
        fromCardId:
          type: string
          format: uuid
        toWalletId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01
        description:
          type: string

    DashboardMetrics:
      type: object
      properties:
        totalBalance:
          type: number
          format: double
        walletCount:
          type: integer
        activeCards:
          type: integer
        totalCards:
          type: integer
        completedTransactions:
          type: integer
        failedTransactions:
          type: integer
        totalTransactions:
          type: integer

security:
  - BearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Registrar una nueva empresa
      operationId: registerCompany
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyCreateRequest'
      responses:
        '201':
          description: Empresa registrada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /dashboard/metrics:
    get:
      tags: [Dashboard]
      summary: Obtener métricas agregadas del dashboard
      operationId: getDashboardMetrics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Métricas del dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardMetrics'

  /wallets:
    get:
      tags: [Wallets]
      summary: Listar wallets de la empresa
      operationId: listWallets
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista de wallets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Wallet'

    post:
      tags: [Wallets]
      summary: Crear una wallet
      operationId: createWallet
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currency:
                  type: string
                  default: USD
      responses:
        '201':
          description: Wallet creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wallet'

  /wallets/{walletId}:
    get:
      tags: [Wallets]
      summary: Obtener wallet por ID
      operationId: getWalletById
      security:
        - BearerAuth: []
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Wallet encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wallet'
        '404':
          description: Wallet no encontrada

  /wallets/{walletId}/transactions:
    get:
      tags: [Wallets]
      summary: Historial de transacciones de una wallet (paginado)
      operationId: listWalletTransactions
      security:
        - BearerAuth: []
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Página de transacciones
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageResponse'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/Transaction'

  /cards:
    get:
      tags: [Cards]
      summary: Listar tarjetas (por wallet opcional)
      operationId: listCards
      security:
        - BearerAuth: []
      parameters:
        - name: walletId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de tarjetas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Card'

  /wallets/{walletId}/cards:
    post:
      tags: [Cards]
      summary: Emitir nueva tarjeta en una wallet
      operationId: createCard
      security:
        - BearerAuth: []
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardCreateRequest'
      responses:
        '201':
          description: Tarjeta emitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'

  /cards/{cardId}:
    get:
      tags: [Cards]
      summary: Obtener detalles de tarjeta
      operationId: getCardById
      security:
        - BearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tarjeta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'

    patch:
      tags: [Cards]
      summary: Actualizar estado o límite de tarjeta
      operationId: updateCard
      security:
        - BearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardUpdateRequest'
      responses:
        '200':
          description: Tarjeta actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'

    delete:
      tags: [Cards]
      summary: Cancelar una tarjeta
      operationId: deleteCard
      security:
        - BearerAuth: []
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Tarjeta cancelada

  /transactions:
    post:
      tags: [Transactions]
      summary: Realizar un pago
      operationId: pay
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '201':
          description: Transacción creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: Fondos insuficientes o límite excedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Transactions]
      summary: Listar transacciones global (paginado)
      operationId: listTransactions
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, COMPLETED, FAILED]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Página de transacciones
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageResponse'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/Transaction'

  /users:
    get:
      tags: [Users]
      summary: Listar usuarios de la empresa (paginado)
      operationId: listUsers
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Página de usuarios
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PageResponse'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'

    post:
      tags: [Users]
      summary: Crear un usuario en la empresa
      operationId: createUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{userId}:
    get:
      tags: [Users]
      summary: Obtener usuario por ID
      operationId: getUserById
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Usuario no encontrado

    patch:
      tags: [Users]
      summary: Actualizar nombre, rol o wallet de un usuario
      operationId: updateUser
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Usuario no encontrado

    delete:
      tags: [Users]
      summary: Eliminar un usuario
      operationId: deleteUser
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Usuario eliminado
        '404':
          description: Usuario no encontrado
