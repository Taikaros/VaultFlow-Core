name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Run unit & integration tests
        run: mvn test -B

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -B
        working-directory: ./backend

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: ./frontend

      - name: Package frontend
        run: |
          cd frontend
          tar -czf ../vaultflow-frontend.tar.gz .next/ package.json node_modules/ next.config.mjs 2>/dev/null || \
          tar -czf ../vaultflow-frontend.tar.gz .next/ package.json node_modules/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: VaultFlow-Core ${{ github.ref_name }}
          body_path: .github/release-template.md
          files: |
            backend/target/vaultflow-core-*.jar
            vaultflow-frontend.tar.gz
          generate_release_notes: true

  docker:
    name: Publish Docker Images
    if: startsWith(github.ref, 'refs/tags/v') && secrets.DOCKER_USERNAME != ''
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vaultflow-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/vaultflow-backend:${{ steps.version.outputs.tag }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vaultflow-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/vaultflow-frontend:${{ steps.version.outputs.tag }}
